# ==========================================
# CRM Sistema - Application Configuration
# ==========================================
spring.application.name=crm-sistema
server.port=8080

# ==========================================
# Database - PostgreSQL
# ==========================================
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/crm_db}
spring.datasource.username=${DATABASE_USER:postgres}
spring.datasource.password=${DATABASE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ==========================================
# Flyway Migrations
# ==========================================
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# ==========================================
# JWT Configuration
# ==========================================
jwt.secret=${JWT_SECRET:3cfa76ef14937c1c0ea519f8fc057a80fcd04a7420f8e8bcd0a7567c272e007b}
jwt.expiration=${JWT_EXPIRATION:86400000}
jwt.refresh-expiration=${JWT_REFRESH_EXPIRATION:604800000}

# ==========================================
# CORS
# ==========================================
cors.allowed-origins=${CORS_ORIGINS:http://localhost:3000,http://localhost:3001}

# ==========================================
# Swagger / OpenAPI
# ==========================================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.try-it-out-enabled=true

# ==========================================
# UazAPI - WhatsApp
# ==========================================
uazapi.base-url=${UAZAPI_BASE_URL:https://api.uazapi.com}
uazapi.token=${UAZAPI_TOKEN:seu-token-uazapi}
uazapi.instance=${UAZAPI_INSTANCE:sua-instancia}

# ==========================================
# Asaas - Pagamentos
# ==========================================
asaas.base-url=${ASAAS_BASE_URL:https://api.asaas.com/v3}
asaas.api-key=${ASAAS_API_KEY:$aact_seu-token-asaas}

# ==========================================
# n8n - Automação
# ==========================================
n8n.base-url=${N8N_BASE_URL:http://localhost:5678}
n8n.api-key=${N8N_API_KEY:sua-api-key-n8n}
n8n.webhook-url=${N8N_WEBHOOK_URL:http://localhost:5678/webhook}

# ==========================================
# Email
# ==========================================
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:seu-email@gmail.com}
spring.mail.password=${MAIL_PASSWORD:sua-senha-app}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ==========================================
# Cache
# ==========================================
spring.cache.type=simple

# ==========================================
# Logging
# ==========================================
logging.level.com.crm=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN
